services:
  backend:
    environment:
      Auth__SecureCookies: "true"
      Auth__RequireHttpsMetadata: "true"

  nginx:
    ports:
      - "443:443"
    volumes:
      - ${HOST_PROJECT_PATH:-.}/nginx/local-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOST_PROJECT_PATH:-.}/.local-certs:/etc/nginx/certs:ro
