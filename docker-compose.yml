services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_ORIGIN: http://backend:8080
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=portfolio;Username=portfolio;Password=portfolio
      Auth__DataProtectionKeysPath: /app/data-protection
      Auth__MediaRoot: /app/media
    expose:
      - "8080"
    depends_on:
      - db
    volumes:
      - data-protection-keys:/app/data-protection
      - media-storage:/app/media

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ${NGINX_DEFAULT_CONF:-./nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./.local-certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
  data-protection-keys:
  media-storage:
