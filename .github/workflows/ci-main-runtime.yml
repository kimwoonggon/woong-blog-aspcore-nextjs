name: CI Main Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend lint, types, and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --run

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend tests
        run: docker run --pull=always --rm -v "$PWD/backend:/src" -w /src mcr.microsoft.com/dotnet/sdk:10.0 dotnet test tests/WoongBlog.Api.Tests/WoongBlog.Api.Tests.csproj

  compose-verify:
    name: Compose Main Runtime Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local runtime images
        run: |
          docker build -f Dockerfile -t local/woong-blog-frontend:ci .
          docker build -f backend/Dockerfile -t local/woong-blog-backend:ci .

      - name: Compose config and smoke
        env:
          FRONTEND_IMAGE: local/woong-blog-frontend:ci
          BACKEND_IMAGE: local/woong-blog-backend:ci
        run: ./scripts/ci-compose-smoke.sh main

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-tests
      - compose-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build local runtime images
        run: |
          docker build -f Dockerfile -t local/woong-blog-frontend:ci .
          docker build -f backend/Dockerfile -t local/woong-blog-backend:ci .

      - name: Start main runtime compose stack
        env:
          FRONTEND_IMAGE: local/woong-blog-frontend:ci
          BACKEND_IMAGE: local/woong-blog-backend:ci
        run: KEEP_RUNNING=1 ./scripts/ci-compose-smoke.sh main

      - name: Run public browser smoke
        env:
          PLAYWRIGHT_SKIP_AUTH_BOOTSTRAP: "1"
          PLAYWRIGHT_EXPECT_LOCAL_ADMIN_SHORTCUT: hidden
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost
        run: npx playwright test tests/ci-compose-public.spec.ts --project=chromium-public --workers=1

      - name: Tear down compose stack
        if: always()
        run: docker compose --env-file .env.prod.ci -f docker-compose.prod.yml down --remove-orphans --volumes
