name: CI Dev

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - "feature/**"
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend lint, types, and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --run

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend tests
        run: docker run --pull=always --rm -v "$PWD/backend:/src" -w /src mcr.microsoft.com/dotnet/sdk:10.0 dotnet test tests/WoongBlog.Api.Tests/WoongBlog.Api.Tests.csproj

  compose-verify:
    name: Compose Dev Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose config and smoke
        run: ./scripts/ci-compose-smoke.sh dev

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-tests
      - compose-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start dev compose stack
        run: KEEP_RUNNING=1 ./scripts/ci-compose-smoke.sh dev

      - name: Run public browser smoke
        env:
          PLAYWRIGHT_SKIP_AUTH_BOOTSTRAP: "1"
          PLAYWRIGHT_EXPECT_LOCAL_ADMIN_SHORTCUT: visible
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost
        run: npx playwright test tests/ci-compose-public.spec.ts --project=chromium-public --workers=1

      - name: Run runtime auth smoke
        env:
          PLAYWRIGHT_EXPECT_LOCAL_ADMIN_SHORTCUT: visible
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost
        run: npx playwright test tests/test-server-runtime.spec.ts tests/auth-security-browser.spec.ts tests/public-admin-affordances.spec.ts tests/ui-header-overlays.spec.ts --project=chromium-runtime-auth --workers=1

      - name: Tear down compose stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down --remove-orphans --volumes
