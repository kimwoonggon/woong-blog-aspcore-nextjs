services:
  frontend:
    image: ${FRONTEND_IMAGE}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_ORIGIN: http://backend:8080
      ENABLE_LOCAL_ADMIN_SHORTCUT: "false"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    env_file:
      - ${APP_ENV_FILE:-.env.staging}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Auth__Enabled: ${Auth__Enabled:-false}
      Auth__DataProtectionKeysPath: /app/data-protection
      Auth__MediaRoot: /app/media
      Auth__EnableTestLoginEndpoint: "false"
      Auth__SecureCookies: "true"
      Auth__RequireHttpsMetadata: "true"
      Proxy__KnownNetworks__0: ${PROXY_KNOWN_NETWORK:-172.16.0.0/12}
      Security__UseHttpsRedirection: "true"
      Security__UseHsts: "true"
    expose:
      - "8080"
    depends_on:
      - db
    volumes:
      - data-protection-keys:/app/data-protection
      - media-storage:/app/media
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_DEFAULT_CONF:-./nginx/prod-bootstrap.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${CERTBOT_WWW_DIR:-./certbot/www}:/var/www/certbot
      - ${LETSENCRYPT_DIR:-./certbot/conf}:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  data-protection-keys:
  media-storage:
